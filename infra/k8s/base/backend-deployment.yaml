apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: taxwijs
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/ad3999/nl-tax-ai/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: taxwijs-secrets
                  key: django-secret-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: taxwijs-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: taxwijs-secrets
                  key: anthropic-api-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: taxwijs-secrets
                  key: database-url
            - name: EMBEDDING_PROVIDER
              value: "openai"
          livenessProbe:
            httpGet:
              path: /api/users/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/users/health/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: taxwijs
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 8000

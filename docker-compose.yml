version: "3.9"

services:

  # ── PostgreSQL database ───────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taxwijs}
      POSTGRES_USER: ${POSTGRES_USER:-taxwijs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taxwijs_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taxwijs}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Port intentionally NOT exposed to host — internal Docker network only.
    # For local DB access during development: add "ports: ['5432:5432']" to a
    # docker-compose.override.yml file.

  # ── Django backend ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-taxwijs}:${POSTGRES_PASSWORD:-taxwijs_dev}@db:5432/${POSTGRES_DB:-taxwijs}
      DJANGO_SETTINGS_MODULE: config.settings
    volumes:
      - chroma_data:/app/phase2/chroma_db
      - static_files:/app/backend/staticfiles
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/users/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Port intentionally NOT exposed to host — nginx handles all external traffic.

  # ── React frontend + nginx ────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

  # ── (Optional) Dev-only: hot-reload frontend ──────────────
  # Uncomment for local development:
  # frontend-dev:
  #   image: node:22-alpine
  #   working_dir: /app
  #   command: npm run dev -- --host
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   ports:
  #     - "5173:5173"
  #   environment:
  #     VITE_API_URL: "http://localhost:8000"

volumes:
  postgres_data:
  chroma_data:
  static_files:

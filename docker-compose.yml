version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nltaxai
      POSTGRES_USER: nltaxai
      POSTGRES_PASSWORD: nltaxai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./.env:/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://nltaxai:nltaxai@db:5432/nltaxai
      REDIS_URL: redis://redis:6379/0
      DEBUG: "true"

  celery:
    build: ./backend
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
      - ./.env:/.env
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://nltaxai:nltaxai@db:5432/nltaxai
      REDIS_URL: redis://redis:6379/0

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

name: CI

on:
  push:
    branches: [master, main, "feat/**", "fix/**"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:

  # ── BACKEND ────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Ruff lint
        run: ruff check backend/

      - name: Black format check
        run: black --check backend/

      - name: mypy type check
        run: mypy backend/ --ignore-missing-imports

  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: taxwijs_test
          POSTGRES_USER: taxwijs
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://taxwijs:testpassword@localhost:5432/taxwijs_test
      REDIS_URL: redis://localhost:6379
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      DJANGO_SETTINGS_MODULE: config.settings
      DJANGO_ENV: test
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_TEST }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run migrations
        run: python backend/manage.py migrate --noinput

      - name: Run Phase 1 validation
        run: python phase1/scripts/validate.py

      - name: Run backend tests
        run: |
          pytest backend/ \
            --cov=backend \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: backend

  # ── TAX CALCULATOR ACCURACY ────────────────────────────
  calculator-accuracy:
    name: Tax Calculator — Benchmark Scenarios
    runs-on: ubuntu-latest
    needs: backend-test

    env:
      DATABASE_URL: postgresql://taxwijs:testpassword@localhost:5432/taxwijs_test
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_ENV: test

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: taxwijs_test
          POSTGRES_USER: taxwijs
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run migrations
        run: python backend/manage.py migrate --noinput

      - name: Import Phase 1 rules
        run: python backend/manage.py import_phase1_rules --year 2026

      - name: Run all 6 benchmark scenarios
        run: |
          python -m pytest backend/tests/test_calculator_scenarios.py \
            -v --tb=short
        # This test suite validates all 6 scenarios against known totals (<1% error)

  # ── FRONTEND ───────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: TypeScript type check
        run: npm run typecheck --prefix frontend

      - name: ESLint
        run: npm run lint --prefix frontend

  frontend-test:
    name: Frontend — Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run tests
        run: npm test --prefix frontend -- --coverage --watchAll=false

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: frontend/coverage/lcov.info
          flags: frontend

  frontend-build:
    name: Frontend — Production Build
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build
        run: npm run build --prefix frontend
        env:
          VITE_API_URL: https://api.taxwijs.nl
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── RAG PIPELINE ───────────────────────────────────────
  rag-accuracy:
    name: RAG Pipeline — Retrieval Accuracy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || contains(github.event.pull_request.labels.*.name, 'rag-test')

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_TEST }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Phase 2 dependencies
        run: pip install -r phase2/requirements.txt

      - name: Build RAG index
        run: python phase2/build_index.py

      - name: Run retrieval accuracy tests
        run: python phase2/test_retrieval.py
        # Must pass: precision@5 ≥95%, cross-lingual same top-3, token budget ≤1500

  # ── OPENAPI VALIDATION ─────────────────────────────────
  api-spec-validate:
    name: API Spec — Validate OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Validate OpenAPI spec
        run: redocly lint docs/03-api/openapi.yaml --skip-rule=no-unused-components

  # ── SECURITY SCAN ──────────────────────────────────────
  dependency-scan:
    name: Security — Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Python safety check
        run: |
          pip install safety
          safety check -r backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Node audit
        run: npm audit --audit-level=high --prefix frontend
        continue-on-error: true  # Report only, don't block on first run

  # ── ALL CHECKS GATE ────────────────────────────────────
  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - calculator-accuracy
      - frontend-build
      - api-spec-validate
    steps:
      - run: echo "All required checks passed"

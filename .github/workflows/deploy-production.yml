name: Deploy to Production

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: production-deployment
  cancel-in-progress: false  # never cancel a production deploy in progress

jobs:
  verify:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run all backend tests
        run: cd backend && pytest --tb=short
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DATABASE_URL: sqlite:///test.db
          DJANGO_SECRET_KEY: ${{ secrets.CI_SECRET_KEY }}
          ANTHROPIC_API_KEY: ''  # mock mode in CI

      - name: Validate Phase 1 data
        run: python phase1/scripts/validate.py

      - name: Validate Phase 2 RAG gates
        run: python phase2/test_retrieval.py

      - name: Validate Phase 3 calculator accuracy
        run: python phase3/test_scenarios.py

      - name: Build frontend
        run: |
          cd ui/new-ui
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: https://api.taxwijs.nl

  deploy-backend:
    name: Deploy Django Backend
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: production
      url: https://api.taxwijs.nl
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Run database migrations
        run: |
          cd backend
          railway run python manage.py migrate --noinput
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_ENVIRONMENT: production

      - name: Deploy backend to Railway
        run: railway up --environment production --service backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment health
        run: |
          for i in {1..30}; do
            if curl -sf https://api.taxwijs.nl/api/health/; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 10
          done
          echo "Health check failed after 5 minutes"
          exit 1

  rebuild-rag-index:
    name: Rebuild RAG Index (OpenAI, if needed)
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if RAG rebuild is needed
        id: rag_check
        run: |
          # Rebuild if: phase1/ data changed, OR manifest uses wrong provider (local)
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          PHASE1_CHANGED="false"
          if [ -n "$PREV_TAG" ] && git diff $PREV_TAG HEAD --name-only | grep -q "phase1/"; then
            PHASE1_CHANGED="true"
          fi

          WRONG_PROVIDER="false"
          if grep -q '"provider": "local"' phase2/embedding_manifest.json 2>/dev/null; then
            WRONG_PROVIDER="true"
            echo "WARNING: manifest shows provider=local — forcing rebuild with OpenAI"
          fi

          if [ "$PHASE1_CHANGED" = "true" ] || [ "$WRONG_PROVIDER" = "true" ]; then
            echo "rebuild=true" >> $GITHUB_OUTPUT
          else
            echo "rebuild=false" >> $GITHUB_OUTPUT
          fi

      - name: Rebuild RAG index with OpenAI (primary provider)
        if: steps.rag_check.outputs.rebuild == 'true'
        run: railway run python phase2/build_index.py --provider openai --reset
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_ENVIRONMENT: production
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  deploy-frontend:
    name: Deploy React Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend
        run: |
          cd ui/new-ui
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: https://api.taxwijs.nl

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ui/new-ui/dist/ --project-name taxwijs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Notify success
        if: needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success'
        run: |
          echo "Deployment ${{ steps.tag.outputs.version }} successful"
          # Add Slack/email notification here

      - name: Notify failure
        if: needs.deploy-backend.result == 'failure' || needs.deploy-frontend.result == 'failure'
        run: |
          echo "DEPLOYMENT FAILED: ${{ steps.tag.outputs.version }}"
          # Add Slack/email notification here
          exit 1

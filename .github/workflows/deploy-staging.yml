name: Deploy — Staging

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip tests (emergency deploy only)
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:

  test-gate:
    name: Run CI gate before deploy
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    if: ${{ !inputs.skip_tests }}

  deploy-backend-staging:
    name: Deploy Backend → Staging
    runs-on: ubuntu-latest
    needs: [test-gate]
    if: always() && (needs.test-gate.result == 'success' || inputs.skip_tests)
    environment:
      name: staging
      url: https://staging-api.taxwijs.nl

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway (staging)
        run: railway up --service backend-staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

      - name: Wait for deployment health
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging-api.taxwijs.nl/api/health/)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS, retrying..."
            sleep 10
          done
          echo "Health check failed after 2 minutes"
          exit 1

      - name: Run smoke tests against staging
        run: |
          pip install httpx pytest
          pytest backend/tests/smoke/ --base-url=https://staging-api.taxwijs.nl -v
        env:
          TEST_API_URL: https://staging-api.taxwijs.nl

  deploy-frontend-staging:
    name: Deploy Frontend → Staging
    runs-on: ubuntu-latest
    needs: [deploy-backend-staging]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build for staging
        run: npm run build --prefix frontend
        env:
          VITE_API_URL: https://staging-api.taxwijs.nl
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID_STAGING }}
          VITE_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY_STAGING }}

      - name: Deploy to Railway (frontend staging)
        run: railway up --service frontend-staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

  notify-staging:
    name: Notify staging deployment
    runs-on: ubuntu-latest
    needs: [deploy-frontend-staging]
    if: always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "Staging deploy ${{ needs.deploy-frontend-staging.result == 'success' && '✅ succeeded' || '❌ failed' }}",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Staging Deploy* — ${{ github.ref_name }} — ${{ github.sha }}\nBackend: ${{ needs.deploy-backend-staging.result }} | Frontend: ${{ needs.deploy-frontend-staging.result }}"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

[phases.setup]
nixPkgs = ["nodejs_20", "python311Full"]

[phases.install]
cmds = [
  "python3 -m pip install -r backend/requirements.txt",
  "cd frontend && npm ci --legacy-peer-deps"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "cd backend && python3 manage.py collectstatic --noinput"
]

[start]
cmd = "bash start.sh"

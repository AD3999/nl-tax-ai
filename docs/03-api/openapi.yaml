openapi: "3.1.0"

info:
  title: TaxWijs API
  version: "1.0.0"
  description: |
    AI Tax Operating System for Dutch taxpayers and accountants.
    NL/EN/FA trilingual. All tax arithmetic is performed by the deterministic
    calculator — the AI layer never computes numbers.
  contact:
    email: api@taxwijs.nl
  license:
    name: Proprietary

servers:
  - url: https://api.taxwijs.nl/api
    description: Production
  - url: http://localhost:8000/api
    description: Local development

security:
  - BearerAuth: []

# ─────────────────────────────────────────────
# TAGS
# ─────────────────────────────────────────────
tags:
  - name: auth
  - name: users
  - name: chat
  - name: calculator
  - name: checker
  - name: rules
  - name: engagements
  - name: checklist
  - name: documents
  - name: messages
  - name: notifications
  - name: audit
  - name: marketplace
  - name: admin-users
  - name: admin-rules
  - name: admin-flags
  - name: admin-dsar
  - name: billing

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────
paths:

  # ── AUTH ──────────────────────────────────

  /users/register/:
    post:
      tags: [auth]
      operationId: auth_register
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201": { $ref: "#/components/responses/TokenPair" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /users/login/:
    post:
      tags: [auth]
      operationId: auth_login
      summary: Obtain JWT token pair
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200": { $ref: "#/components/responses/TokenPair" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /users/token/refresh/:
    post:
      tags: [auth]
      operationId: auth_refresh
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh: { type: string }
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /users/logout/:
    post:
      tags: [auth]
      operationId: auth_logout
      summary: Blacklist refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh]
              properties:
                refresh: { type: string }
      responses:
        "204": { description: Logged out }

  /auth/google/:
    post:
      tags: [auth]
      operationId: auth_google
      summary: Exchange Google auth code for JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string, description: Google OAuth authorization code }
      responses:
        "200": { $ref: "#/components/responses/TokenPair" }
        "400": { $ref: "#/components/responses/ValidationError" }

  # ── USERS ────────────────────────────────

  /users/me/:
    get:
      tags: [users]
      operationId: users_me_get
      summary: Get current user profile
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }
          description: User profile
        "401": { $ref: "#/components/responses/Unauthorized" }
    patch:
      tags: [users]
      operationId: users_me_patch
      summary: Update profile (name, language preference)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserProfileUpdate" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserProfile" }
          description: Updated profile
        "400": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [users]
      operationId: users_me_delete
      summary: GDPR account deletion (anonymization)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirm]
              properties:
                confirm: { type: string, enum: [DELETE] }
      responses:
        "204": { description: Account anonymized }
        "400": { $ref: "#/components/responses/ValidationError" }

  /users/intake-profile/:
    get:
      tags: [users]
      operationId: intake_get
      summary: Get tax intake profile
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntakeProfile" }
          description: Intake profile
    put:
      tags: [users]
      operationId: intake_put
      summary: Save or update intake profile (full replace)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IntakeProfile" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IntakeProfile" }
          description: Saved intake profile
        "400": { $ref: "#/components/responses/ValidationError" }

  /users/tax-memory/:
    get:
      tags: [users]
      operationId: tax_memory_get
      summary: Get AI tax memory (profile facts for AI context)
      responses:
        "200":
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
          description: Tax memory key-value store
    patch:
      tags: [users]
      operationId: tax_memory_patch
      summary: Update specific tax memory fields
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          content:
            application/json:
              schema: { type: object }
          description: Updated tax memory

  /users/push-subscription/:
    post:
      tags: [users]
      operationId: push_subscribe
      summary: Register VAPID push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PushSubscription" }
      responses:
        "201": { description: Subscribed }
        "400": { $ref: "#/components/responses/ValidationError" }
    delete:
      tags: [users]
      operationId: push_unsubscribe
      summary: Remove push subscription
      responses:
        "204": { description: Unsubscribed }

  /users/notification-preferences/:
    get:
      tags: [users]
      operationId: notif_prefs_get
      summary: Get notification preferences
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationPreferences" }
          description: Preferences
    put:
      tags: [users]
      operationId: notif_prefs_put
      summary: Update notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationPreferences" }
      responses:
        "200":
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationPreferences" }
          description: Updated preferences

  # ── CHAT ────────────────────────────────

  /chat/:
    post:
      tags: [chat]
      operationId: chat_send
      summary: Send a chat message (SSE streaming response)
      description: |
        Returns a Server-Sent Events stream. Each event is a JSON token delta.
        Final event type is `done` with the complete message and source citations.
        The AI never computes tax numbers — the calculator is called automatically
        when numeric answers are needed.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChatRequest" }
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-Sent Events stream of ChatToken objects
        "400": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /chat/history/:
    get:
      tags: [chat]
      operationId: chat_history
      summary: Get recent conversation history
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: mode
          in: query
          schema: { type: string, enum: [chat, ib_guide, simulation] }
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items: { $ref: "#/components/schemas/ChatMessage" }

  /chat/clear/:
    post:
      tags: [chat]
      operationId: chat_clear
      summary: Clear conversation history for current session
      responses:
        "204": { description: History cleared }

  /chat/sources/:
    get:
      tags: [chat]
      operationId: chat_sources
      summary: Get source URLs cited in last response
      responses:
        "200":
          description: List of citations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Citation" }

  # ── CALCULATOR ──────────────────────────

  /calculator/calculate/:
    post:
      tags: [calculator]
      operationId: calculator_run
      summary: Run deterministic tax calculation
      description: |
        Returns a complete tax calculation breakdown. The AI layer calls
        this endpoint and reads the result — it never computes numbers itself.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CalculatorRequest" }
      responses:
        "200":
          description: Full tax calculation result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CalculatorResult" }
        "400": { $ref: "#/components/responses/ValidationError" }

  /calculator/scenarios/:
    get:
      tags: [calculator]
      operationId: calculator_scenarios
      summary: List benchmark tax scenarios
      security: []
      responses:
        "200":
          description: List of benchmark scenarios
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TaxScenario" }

  /calculator/scenarios/{scenario_id}/:
    get:
      tags: [calculator]
      operationId: calculator_scenario_get
      summary: Get one benchmark scenario with full calculation
      security: []
      parameters:
        - { name: scenario_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Full scenario
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaxScenario" }

  # ── DEDUCTION CHECKER ───────────────────

  /checker/rules/{year}/:
    get:
      tags: [checker]
      operationId: checker_rules
      summary: Get rule cards for the deduction checker
      security: []
      parameters:
        - { name: year, in: path, required: true, schema: { type: integer, example: 2026 } }
      responses:
        "200":
          description: Rule cards for checker
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/RuleCard" }

  /checker/submit/:
    post:
      tags: [checker]
      operationId: checker_submit
      summary: Submit checker answers, get eligibility results
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckerSubmission" }
      responses:
        "200":
          description: Eligibility results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CheckerResult" }
        "400": { $ref: "#/components/responses/ValidationError" }

  /checker/explain/:
    post:
      tags: [checker]
      operationId: checker_explain
      summary: Get AI explanation for checker results (SSE)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CheckerExplainRequest" }
      responses:
        "200":
          description: SSE explanation stream
          content:
            text/event-stream:
              schema: { type: string }

  /checker/waitlist/:
    post:
      tags: [checker]
      operationId: checker_waitlist
      summary: Join waitlist for non-ZZP users
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, user_type]
              properties:
                email: { type: string, format: email }
                user_type: { type: string, enum: [employee, expat, dga] }
      responses:
        "201": { description: Added to waitlist }

  # ── TAX RULES ───────────────────────────

  /rules/:
    get:
      tags: [rules]
      operationId: rules_list
      summary: List verified tax rules
      security: []
      parameters:
        - { name: year, in: query, schema: { type: integer, default: 2026 } }
        - { name: topic, in: query, schema: { type: string } }
        - { name: user_type, in: query, schema: { type: string, enum: [zzp, employee, expat, dga, all] } }
        - { name: category, in: query, schema: { type: string } }
      responses:
        "200":
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TaxRule" }

  /rules/{rule_id}/:
    get:
      tags: [rules]
      operationId: rules_get
      summary: Get a single rule by rule_id
      security: []
      parameters:
        - { name: rule_id, in: path, required: true, schema: { type: string, example: ZA-2026-001 } }
      responses:
        "200":
          description: Rule detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaxRule" }
        "404": { $ref: "#/components/responses/NotFound" }

  /rules/{rule_id}/history/:
    get:
      tags: [rules]
      operationId: rules_history
      summary: Get version history of a rule (admin only)
      parameters:
        - { name: rule_id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Version history
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TaxRule" }

  # ── ENGAGEMENTS ─────────────────────────

  /portal/engagements/:
    get:
      tags: [engagements]
      operationId: engagements_list
      summary: List engagements for current user
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: tax_year, in: query, schema: { type: integer } }
      responses:
        "200":
          description: List of engagements
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TaxEngagement" }
    post:
      tags: [engagements]
      operationId: engagements_create
      summary: Create a new engagement (accountant or self-service)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EngagementCreate" }
      responses:
        "201":
          description: Created engagement
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaxEngagement" }
        "400": { $ref: "#/components/responses/ValidationError" }

  /portal/engagements/{id}/:
    get:
      tags: [engagements]
      operationId: engagements_get
      summary: Get engagement detail
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Engagement detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaxEngagement" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [engagements]
      operationId: engagements_patch
      summary: Update engagement (status, assigned accountant)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EngagementUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaxEngagement" }

  /portal/engagements/{id}/readiness/:
    get:
      tags: [engagements]
      operationId: readiness_get
      summary: Get readiness score and breakdown
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Readiness result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadinessResult" }

  /portal/engagements/{id}/readiness/recalculate/:
    post:
      tags: [engagements]
      operationId: readiness_recalculate
      summary: Force readiness recalculation
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Recalculated readiness
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReadinessResult" }

  /portal/engagements/{id}/readiness/history/:
    get:
      tags: [engagements]
      operationId: readiness_history
      summary: Get readiness score history (snapshots)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ReadinessSnapshot" }

  /portal/engagements/{id}/actions/:
    get:
      tags: [engagements]
      operationId: actions_list
      summary: List accountant actions for an engagement
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Actions list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AccountantAction" }
    post:
      tags: [engagements]
      operationId: actions_generate
      summary: Generate AI-powered next actions
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Generated actions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AccountantAction" }

  /portal/actions/{id}/:
    patch:
      tags: [engagements]
      operationId: action_update
      summary: Update action status (done/dismissed)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [open, acknowledged, done, dismissed] }
      responses:
        "200":
          description: Updated action
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccountantAction" }

  /portal/invitations/:
    post:
      tags: [engagements]
      operationId: invitation_send
      summary: Send client invitation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InvitationCreate" }
      responses:
        "201":
          description: Invitation sent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Invitation" }
        "400": { $ref: "#/components/responses/ValidationError" }

  /portal/invitations/{token}/accept/:
    post:
      tags: [engagements]
      operationId: invitation_accept
      summary: Accept an invitation (client)
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Accepted, engagement created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaxEngagement" }
        "400": { description: Expired or invalid token }

  # ── CHECKLIST ───────────────────────────

  /portal/engagements/{id}/checklist/:
    get:
      tags: [checklist]
      operationId: checklist_list
      summary: List checklist items for an engagement
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { type: string } }
        - { name: category, in: query, schema: { type: string } }
      responses:
        "200":
          description: Checklist items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChecklistItem" }

  /portal/engagements/{id}/checklist/generate/:
    post:
      tags: [checklist]
      operationId: checklist_generate
      summary: Generate (or re-generate) checklist from profile (idempotent)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Checklist items (newly created + existing)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ChecklistItem" }

  /portal/checklist-items/{id}/:
    patch:
      tags: [checklist]
      operationId: checklist_item_update
      summary: Update checklist item (status, notes)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [todo, waiting_client, uploaded, needs_review, accepted, rejected, waived] }
                accountant_note: { type: string }
                client_note: { type: string }
                due_date: { type: string, format: date }
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChecklistItem" }

  /portal/checklist-items/{id}/request-from-client/:
    post:
      tags: [checklist]
      operationId: checklist_request_client
      summary: Send document request task to client
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200": { description: Request sent, status updated to waiting_client }

  # ── DOCUMENTS ───────────────────────────

  /portal/engagements/{id}/documents/:
    get:
      tags: [documents]
      operationId: documents_list
      summary: List documents for an engagement
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: status, in: query, schema: { type: string } }
        - { name: doc_type, in: query, schema: { type: string } }
      responses:
        "200":
          description: Documents list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ClientDocument" }

  /portal/engagements/{id}/documents/upload/:
    post:
      tags: [documents]
      operationId: documents_upload
      summary: Upload a document
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                doc_type:
                  type: string
                  description: Optional hint — OCR will confirm
                checklist_item_id:
                  type: string
                  format: uuid
                  description: Optional link to checklist item
      responses:
        "201":
          description: Document created, OCR queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClientDocument" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "413":
          description: File too large (max 20MB)

  /portal/documents/{id}/:
    get:
      tags: [documents]
      operationId: documents_get
      summary: Get document detail with extracted fields
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Document with fields
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClientDocumentDetail" }
    delete:
      tags: [documents]
      operationId: documents_delete
      summary: Delete an uploaded-but-not-reviewed document (client only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }

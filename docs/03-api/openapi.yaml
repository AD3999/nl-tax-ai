# ─────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    TokenPair:
      description: JWT access + refresh token pair
      content:
        application/json:
          schema:
            type: object
            properties:
              access: { type: string }
              refresh: { type: string }
              user: { $ref: "#/components/schemas/UserProfile" }

    ValidationError:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ValidationErrors" }

    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

    Forbidden:
      description: Insufficient permissions (tenant isolation or RBAC)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
      headers:
        Retry-After:
          schema: { type: integer }

  schemas:

    Error:
      type: object
      properties:
        detail: { type: string }

    ValidationErrors:
      type: object
      additionalProperties:
        type: array
        items: { type: string }

    UserProfile:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        first_name: { type: string }
        last_name: { type: string }
        role: { type: string, enum: [client, accountant, firm_manager, admin, super_admin] }
        language: { type: string, enum: [nl, en, fa] }
        is_active: { type: boolean }
        date_joined: { type: string, format: date-time }

    UserProfileUpdate:
      type: object
      properties:
        first_name: { type: string }
        last_name: { type: string }
        language: { type: string, enum: [nl, en, fa] }

    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        first_name: { type: string }
        last_name: { type: string }
        role: { type: string, enum: [client, accountant], default: client }
        invitation_token: { type: string, description: Pre-fill if registering via invitation }
        language: { type: string, enum: [nl, en, fa], default: nl }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    IntakeProfile:
      type: object
      properties:
        user_type: { type: string, enum: [zzp, employee, expat, dga, mixed] }
        tax_year: { type: integer }
        has_30pct_ruling: { type: boolean }
        ruling_start_year: { type: integer }
        has_zzp_pension: { type: boolean }
        box3_assets_over_threshold: { type: boolean }
        has_rental_income: { type: boolean }
        has_mortgage: { type: boolean }
        kvk_number: { type: string }
        bsn_last4: { type: string, description: Last 4 digits of BSN — for form matching }
        partner_allowance: { type: boolean }
        children_under_12: { type: integer }

    PushSubscription:
      type: object
      required: [endpoint, keys]
      properties:
        endpoint: { type: string, format: uri }
        keys:
          type: object
          properties:
            p256dh: { type: string }
            auth: { type: string }

    NotificationPreferences:
      type: object
      properties:
        document_uploaded: { type: string, enum: [email, push, both, none] }
        message_received: { type: string, enum: [email, push, both, none] }
        readiness_milestone: { type: string, enum: [email, push, both, none] }
        engagement_ready_to_file: { type: string, enum: [email, push, both, none] }
        overdue_checklist: { type: string, enum: [email, digest, none] }
        ai_actions_summary: { type: string, enum: [email, none] }

    ChatRequest:
      type: object
      required: [message]
      properties:
        message: { type: string }
        mode: { type: string, enum: [chat, ib_guide, simulation], default: chat }
        language: { type: string, enum: [nl, en, fa] }
        include_profile: { type: boolean, default: true, description: Include user profile in context }

    ChatMessage:
      type: object
      properties:
        id: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant] }
        content: { type: string }
        mode: { type: string }
        language: { type: string }
        sources: { type: array, items: { $ref: "#/components/schemas/Citation" } }
        created_at: { type: string, format: date-time }

    Citation:
      type: object
      properties:
        rule_id: { type: string }
        source_url: { type: string, format: uri }
        title: { type: string }

    CalculatorRequest:
      type: object
      required: [user_type, tax_year]
      properties:
        user_type: { type: string, enum: [zzp, employee, expat, dga] }
        tax_year: { type: integer }
        gross_profit: { type: number, description: ZZP profit before any deductions }
        employment_income: { type: number }
        hours_worked: { type: integer, description: For urencriterium check }
        is_starter_year: { type: boolean }
        has_startersaftrek: { type: boolean }
        investments_eur: { type: number, description: For KIA check }
        pension_contribution: { type: number }
        has_30pct_ruling: { type: boolean }
        ruling_year: { type: integer, description: Year in the 5-year phase-down }
        box3_savings: { type: number }
        box3_investments: { type: number }
        is_aow_age: { type: boolean }

    CalculatorResult:
      type: object
      properties:
        tax_year: { type: integer }
        user_type: { type: string }
        gross_income: { type: number }
        zelfstandigenaftrek: { type: number }
        startersaftrek: { type: number }
        mkb_winstvrijstelling: { type: number }
        kia_deduction: { type: number }
        pension_deduction: { type: number }
        taxable_income_box1: { type: number }
        box1_tax: { type: number }
        zvw_contribution: { type: number }
        general_credit: { type: number }
        employment_credit: { type: number }
        total_credits: { type: number }
        net_income_tax: { type: number }
        box2_tax: { type: number }
        box3_tax: { type: number }
        total_tax: { type: number }
        effective_rate: { type: number }
        monthly_reserve: { type: number }
        rule_ids_used: { type: array, items: { type: string } }

    TaxScenario:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        profile: { type: object }
        result: { $ref: "#/components/schemas/CalculatorResult" }

    RuleCard:
      type: object
      properties:
        rule_id: { type: string }
        topic: { type: string }
        plain_nl: { type: string }
        plain_en: { type: string }
        plain_fa: { type: string }
        result_value: { type: object }
        ai_prompt_hint: { type: string }
        source_url: { type: string, format: uri }

    TaxRule:
      type: object
      properties:
        id: { type: string, format: uuid }
        rule_id: { type: string, example: ZA-2026-001 }
        topic: { type: string }
        category: { type: string }
        year: { type: integer }
        user_types: { type: array, items: { type: string } }
        plain_nl: { type: string }
        plain_en: { type: string }
        plain_fa: { type: string }
        condition_summary: { type: string }
        result_type: { type: string }
        result_value: { type: object }
        notes: { type: string }
        ai_prompt_hint: { type: string }
        tags: { type: array, items: { type: string } }
        source_url: { type: string, format: uri }
        verification_status: { type: string, enum: [verified, pending_review, draft] }
        effective_from: { type: string, format: date }
        effective_until: { type: string, format: date, nullable: true }
        version: { type: integer }
        created_at: { type: string, format: date-time }

    TaxRuleCreate:
      type: object
      required: [rule_id, topic, year, plain_nl, plain_en, plain_fa, source_url]
      properties:
        rule_id: { type: string }
        topic: { type: string }
        category: { type: string }
        year: { type: integer }
        user_types: { type: array, items: { type: string } }
        plain_nl: { type: string }
        plain_en: { type: string }
        plain_fa: { type: string }
        condition_summary: { type: string }
        result_type: { type: string }
        result_value: { type: object }
        ai_prompt_hint: { type: string }
        tags: { type: array, items: { type: string } }
        source_url: { type: string, format: uri }
        effective_from: { type: string, format: date }
        effective_until: { type: string, format: date, nullable: true }
        supersedes: { type: string, description: rule_id of previous version }

    CheckerSubmission:

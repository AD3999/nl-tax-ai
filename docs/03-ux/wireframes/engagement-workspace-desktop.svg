<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <!-- Background -->
  <rect width="1200" height="800" fill="#F9FAFB"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="800" fill="#1E293B"/>
  <text x="24" y="40" fill="#FFFFFF" font-size="18" font-weight="bold">TaxWijs</text>
  <text x="24" y="80" fill="#94A3B8" font-size="12">Dashboard</text>
  <rect x="0" y="96" width="240" height="36" fill="#334155"/>
  <text x="24" y="120" fill="#FFFFFF" font-size="13">Klanten</text>
  <text x="24" y="148" fill="#94A3B8" font-size="13">Dossiers</text>
  <text x="24" y="176" fill="#94A3B8" font-size="13">Inbox</text>
  <text x="24" y="204" fill="#94A3B8" font-size="13">Instellingen</text>

  <!-- Header -->
  <rect x="240" y="0" width="960" height="56" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="260" y="20" fill="#6B7280" font-size="12">Klanten / Ayoub Rahimi /</text>
  <text x="260" y="38" fill="#111827" font-size="16" font-weight="600">Dossier 2026 — ZZP</text>
  <!-- Status badge -->
  <rect x="1050" y="15" width="100" height="28" rx="14" fill="#DEF7EC"/>
  <text x="1075" y="34" fill="#03543F" font-size="12" font-weight="600">In Review</text>

  <!-- Readiness Score Card -->
  <rect x="260" y="72" width="200" height="200" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="360" y="100" text-anchor="middle" fill="#6B7280" font-size="12">Gereedheid</text>
  <!-- Circle -->
  <circle cx="360" cy="160" r="60" fill="none" stroke="#E2E8F0" stroke-width="10"/>
  <circle cx="360" cy="160" r="60" fill="none" stroke="#16A34A" stroke-width="10"
    stroke-dasharray="282" stroke-dashoffset="56" transform="rotate(-90 360 160)"/>
  <text x="360" y="155" text-anchor="middle" fill="#111827" font-size="28" font-weight="bold">80</text>
  <text x="360" y="175" text-anchor="middle" fill="#6B7280" font-size="12">/ 100</text>
  <text x="360" y="250" text-anchor="middle" fill="#16A34A" font-size="11" font-weight="600">Klaar voor beoordeling</text>

  <!-- Score Breakdown -->
  <rect x="476" y="72" width="340" height="200" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="496" y="100" fill="#6B7280" font-size="12">Score onderverdeling</text>
  <!-- Bars -->
  <text x="496" y="130" fill="#111827" font-size="13">Documenten (40%)</text>
  <rect x="496" y="138" width="280" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="496" y="138" width="224" height="8" rx="4" fill="#3B82F6"/>
  <text x="782" y="148" fill="#3B82F6" font-size="11">80%</text>
  <text x="496" y="168" fill="#111827" font-size="13">Checklist (30%)</text>
  <rect x="496" y="176" width="280" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="496" y="176" width="252" height="8" rx="4" fill="#3B82F6"/>
  <text x="782" y="186" fill="#3B82F6" font-size="11">90%</text>
  <text x="496" y="206" fill="#111827" font-size="13">Verificatie (20%)</text>
  <rect x="496" y="214" width="280" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="496" y="214" width="168" height="8" rx="4" fill="#F59E0B"/>
  <text x="782" y="224" fill="#F59E0B" font-size="11">60%</text>
  <text x="496" y="244" fill="#111827" font-size="13">Accountant review (10%)</text>
  <rect x="496" y="252" width="280" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="496" y="252" width="280" height="8" rx="4" fill="#16A34A"/>
  <text x="782" y="262" fill="#16A34A" font-size="11">100%</text>

  <!-- Tabs -->
  <rect x="240" y="280" width="960" height="40" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="264" y="306" fill="#3B82F6" font-size="13" font-weight="600">Overzicht</text>
  <line x1="264" y1="318" x2="320" y2="318" stroke="#3B82F6" stroke-width="2"/>
  <text x="340" y="306" fill="#6B7280" font-size="13">Checklist</text>
  <text x="430" y="306" fill="#6B7280" font-size="13">Documenten</text>
  <text x="540" y="306" fill="#6B7280" font-size="13">Review</text>
  <text x="615" y="306" fill="#6B7280" font-size="13">AI Chat</text>
  <text x="680" y="306" fill="#6B7280" font-size="13">Calculator</text>
  <text x="770" y="306" fill="#6B7280" font-size="13">IB Gids</text>
  <text x="840" y="306" fill="#6B7280" font-size="13">Berichten</text>
  <text x="930" y="306" fill="#6B7280" font-size="13">Taken</text>

  <!-- Checklist Panel -->
  <rect x="260" y="332" width="460" height="440" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="280" y="360" fill="#111827" font-size="14" font-weight="600">Checklist</text>
  <!-- Items -->
  <circle cx="292" cy="392" r="8" fill="#16A34A"/>
  <text x="292" y="396" text-anchor="middle" fill="#FFFFFF" font-size="10">✓</text>
  <text x="312" y="396" fill="#111827" font-size="13">Bankafschrift heel jaar</text>
  <text x="600" y="396" text-anchor="end" fill="#16A34A" font-size="11">Goedgekeurd</text>

  <circle cx="292" cy="424" r="8" fill="#16A34A"/>
  <text x="292" y="428" text-anchor="middle" fill="#FFFFFF" font-size="10">✓</text>
  <text x="312" y="428" fill="#111827" font-size="13">Verkoopfacturen</text>
  <text x="600" y="428" text-anchor="end" fill="#16A34A" font-size="11">Goedgekeurd</text>

  <circle cx="292" cy="456" r="8" fill="#3B82F6"/>
  <text x="292" y="460" text-anchor="middle" fill="#FFFFFF" font-size="10">↑</text>
  <text x="312" y="460" fill="#111827" font-size="13">Inkoopfacturen</text>
  <text x="600" y="460" text-anchor="end" fill="#3B82F6" font-size="11">In behandeling</text>

  <circle cx="292" cy="488" r="8" fill="#E2E8F0"/>
  <text x="312" y="492" fill="#6B7280" font-size="13">BTW-aangiftes Q1-Q4</text>
  <text x="600" y="492" text-anchor="end" fill="#6B7280" font-size="11">Ontbreekt</text>

  <circle cx="292" cy="520" r="8" fill="#E2E8F0"/>
  <text x="312" y="524" fill="#6B7280" font-size="13">Urenstaat (1.225 uur)</text>
  <text x="600" y="524" text-anchor="end" fill="#6B7280" font-size="11">Ontbreekt</text>

  <!-- Upload button -->
  <rect x="280" y="744" width="420" height="36" rx="6" fill="#3B82F6"/>
  <text x="490" y="767" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="600">+ Document uploaden</text>

  <!-- Tasks Panel -->
  <rect x="740" y="332" width="460" height="440" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="760" y="360" fill="#111827" font-size="14" font-weight="600">Openstaande taken</text>
  <!-- Task items -->
  <rect x="760" y="376" width="420" height="72" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <rect x="764" y="380" width="4" height="64" rx="2" fill="#F97316"/>
  <text x="780" y="400" fill="#111827" font-size="13" font-weight="600">BTW-aangifte Q1 ontbreekt</text>
  <text x="780" y="418" fill="#6B7280" font-size="12">Klant herinneren BTW-aangifte Q1 2026 te uploaden</text>
  <text x="780" y="436" fill="#F97316" font-size="11">Hoog — vervalt 30 april</text>

  <rect x="760" y="460" width="420" height="72" rx="6" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <rect x="764" y="464" width="4" height="64" rx="2" fill="#16A34A"/>
  <text x="780" y="484" fill="#111827" font-size="13" font-weight="600">Controleer urenstaat voor ZA</text>
  <text x="780" y="502" fill="#6B7280" font-size="12">Verifieer dat de klant 1.225 uur heeft geregistreerd</text>
  <text x="780" y="520" fill="#16A34A" font-size="11">Normaal</text>

  <!-- Footer labels -->
  <text x="600" y="790" text-anchor="middle" fill="#9CA3AF" font-size="11">TaxWijs — Engagement Workspace Desktop</text>
</svg>

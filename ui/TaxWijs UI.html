<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TaxWijs — UI Exploration</title>
  <link rel="stylesheet" href="src/tokens.css" />
  <style>
    html, body, #root { height: 100%; margin: 0; background: oklch(0.97 0.008 95); }
    body { font-family: "Geist", system-ui, sans-serif; color: oklch(0.20 0.012 90); -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Foundation -->
  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/design-canvas.jsx"></script>

  <!-- Screens (each declared in its own file; cross-file scope via window.) -->
  <script type="text/babel" src="src/screens/system.jsx"></script>
  <script type="text/babel" src="src/screens/landing.jsx"></script>
  <script type="text/babel" src="src/screens/auth.jsx"></script>
  <script type="text/babel" src="src/screens/intake.jsx"></script>
  <script type="text/babel" src="src/screens/chat.jsx"></script>
  <script type="text/babel" src="src/screens/calculator.jsx"></script>
  <script type="text/babel" src="src/screens/ib-guide.jsx"></script>
  <script type="text/babel" src="src/screens/simulation.jsx"></script>
  <script type="text/babel" src="src/screens/pricing.jsx"></script>
  <script type="text/babel" src="src/screens/admin.jsx"></script>

  <!-- App composition (loads last) -->
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>

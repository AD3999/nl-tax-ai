<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TaxWijs — Brand · Logo & Loading</title>
  <link rel="stylesheet" href="src/tokens.css" />
  <style>
    html, body, #root { height: 100%; margin: 0; background: oklch(0.97 0.008 95); }
    body { font-family: "Geist", system-ui, sans-serif; color: oklch(0.20 0.012 90); -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Foundation -->
  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/design-canvas.jsx"></script>

  <!-- Brand -->
  <script type="text/babel" src="src/brand/logo-marks.jsx"></script>
  <script type="text/babel" src="src/brand/logo-showcase.jsx"></script>
  <script type="text/babel" src="src/brand/loading.jsx"></script>

  <!-- Compose -->
  <script type="text/babel">
    function BrandApp() {
      return (
        <DesignCanvas>
          <DCSection id="logo" title="01 · Logo system" subtitle="Five marks built from one idea — verified, green, quietly confident. Recommendation in detail below.">
            <DCArtboard id="logo-system" label="Logo · system + 5 options" width={1280} height={1640}>
              <LogoShowcase />
            </DCArtboard>
          </DCSection>

          <DCSection id="loading" title="02 · Loading screens" subtitle="Three directions, paired to the brand. All three loop in place — they're production-ready, not just stills.">
            <DCArtboard id="loading-calm" label="01 · Calm splash · Desktop" width={1280} height={760}>
              <LoadingCalm />
            </DCArtboard>
            <DCArtboard id="loading-compiling" label="02 · Compiling · Desktop" width={1280} height={760}>
              <LoadingCompiling />
            </DCArtboard>
            <DCArtboard id="loading-answer" label="03 · Answer forming · Desktop" width={1280} height={760}>
              <LoadingAnswer />
            </DCArtboard>
            <DCArtboard id="loading-mobile" label="01 · Calm splash · Mobile" width={390} height={780}>
              <LoadingMobileCalm />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<BrandApp />);
  </script>
</body>
</html>
